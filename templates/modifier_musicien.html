{% extends 'base_neon.html' %}
{% block title %}Modifier un musicien{% endblock %}
{% block content %}
<h1 class="page-title">Modifier un musicien</h1>
<p class="page-sub">Mettre à jour les informations du musicien ou de la structure.</p>

<div class="card">
  <div class="card-title"><span class="dot"></span> Informations</div>
  <form method="POST">
    <div class="form-grid">
      <div>
        <label for="prenom">Prénom</label>
        <input type="text" name="prenom" id="prenom" value="{{ musicien.prenom or '' }}" required>
      </div>
      <div>
        <label for="nom">Nom</label>
        <input type="text" name="nom" id="nom" value="{{ musicien.nom or '' }}" required>
      </div>
      <div>
        <label for="type">Type</label>
        <select name="type" id="type" required>
          <option value="musicien" {% if musicien.type == 'musicien' %}selected{% endif %}>Musicien</option>
          <option value="structure" {% if musicien.type == 'structure' %}selected{% endif %}>Structure</option>
        </select>
      </div>
    </div>

    <label class="checkbox-label">
      <input type="checkbox" name="actif" id="actif" {% if musicien.actif %}checked{% endif %}>
      Actif
    </label>

    <div class="row-actions" style="margin-top:18px;">
      <button type="submit" class="btn"><i class="fas fa-floppy-disk"></i> Enregistrer les modifications</button>
      <a class="btn btn-ghost" href="{{ url_for('liste_musiciens') }}"><i class="fas fa-arrow-left"></i> Retour à la liste</a>
    </div>
  </form>
</div>
{% endblock %}
