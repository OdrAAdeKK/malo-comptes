{% extends 'base_neon.html' %}
{% block title %}Archives{% endblock %}
{% block content %}
<h1 class="page-title">Archives</h1>
<p class="page-sub">Consultez l'historique des concerts, cachets et opérations</p>

<div class="card">
    <div class="card-title"><span class="dot"></span> Rubriques d'archives</div>
    <div class="form-grid">
        <a href="{{ url_for('archives_concerts') }}" class="btn"><i class="fas fa-microphone"></i> Archives Concerts</a>
        <a href="{{ url_for('archives_cachets') }}" class="btn"><i class="fas fa-money-bill-wave"></i> Archives Cachets</a>
        <a href="{{ url_for('archives_operations') }}" class="btn"><i class="fas fa-file-invoice"></i> Archives Opérations</a>
    </div>

    <div class="row-actions" style="margin-top:18px">
        <a href="{{ url_for('accueil') }}" class="btn btn-ghost"><i class="fas fa-home"></i> Accueil</a>
        <a href="#" onclick="if (document.referrer) { window.history.back(); } else { window.location.href='{{ url_for('accueil') }}'; }" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Retour</a>
    </div>
</div>
{% endblock %}
