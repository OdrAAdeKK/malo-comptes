<div id="popup-ajustements" style="display:none;">
  <div class="popup-backdrop" style="
    position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:9998;"></div>

  <div class="popup-panel" style="
    position:fixed; z-index:9999; left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:min(92vw,720px); max-height:80vh; overflow:auto;
    background:#111726; color:#e8eef7; border:1px solid #27344f; border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.5); padding:20px;">
    <h3 style="margin:0 0 12px; font-family:'Sora',sans-serif;">Ajuster / fixer les gains</h3>

    <div id="ajustements-list">
      <!-- Rempli dynamiquement par popup_ajustements.js -->
    </div>

    <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:18px;">
      <button id="ajust-cancel" type="button"
              style="padding:9px 14px; border-radius:10px; border:1px solid #27344f; background:#0f1422; color:#8b97ab; font-weight:700; cursor:pointer;">
        Annuler
      </button>
      <button id="ajust-save" type="button"
              style="padding:9px 14px; border-radius:10px; border:0; background:linear-gradient(135deg,#22d3ee,#a3e635); color:#04111a; font-weight:700; cursor:pointer;">
        Enregistrer
      </button>
    </div>

    <style>
      #ajustements-list .row{
        display:grid; grid-template-columns: 1fr 130px auto; align-items:center;
        gap:10px; padding:9px 0; border-bottom:1px dashed #1e2940;
      }
      #ajustements-list .row label{ font-weight:600; color:#e8eef7; }
      #ajustements-list .row input{ width:100%; padding:8px 10px; border:1px solid #27344f; border-radius:8px; text-align:right; background:#0f1422; color:#e8eef7; }
      #ajustements-list .row .note{ color:#8b97ab; font-size:.9em; white-space:nowrap; }
    </style>
  </div>
</div>
