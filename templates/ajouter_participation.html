{% extends 'base_neon.html' %}
{% block title %}Ajouter une participation{% endblock %}
{% block content %}
<h1 class="page-title">Ajouter une participation</h1>
<p class="page-sub">{{ concert.lieu }} — {{ concert.date.strftime("%d/%m/%Y") }}</p>

<div class="card">
    <div class="card-title"><span class="dot"></span> Nouvelle participation</div>
    <form method="post">
        <div class="form-grid">
            <div>
                <label for="musicien_id">Musicien</label>
                <select name="musicien_id" id="musicien_id" required>
                    {% for m in musiciens %}
                    <option value="{{ m.id }}">{{ m.prenom }} {{ m.nom }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="paye"><input type="checkbox" name="paye" id="paye"> Payé</label>
            </div>
        </div>
        <button type="submit" class="btn"><i class="fas fa-plus"></i> Ajouter</button>
        <a class="btn btn-ghost" href="{{ url_for('liste_participations', concert_id=concert.id) }}"><i class="fas fa-arrow-left"></i> Retour à la liste</a>
    </form>
</div>
{% endblock %}
