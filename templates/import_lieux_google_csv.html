{% extends 'base_neon.html' %}
{% block title %}Importer des lieux (Google CSV){% endblock %}
{% block content %}
<h1 class="page-title">Importer des lieux</h1>
<p class="page-sub">Depuis Google Contacts : Plus d'actions → Exporter → format « Google CSV ».</p>

<div class="card" style="max-width:700px">
  <form method="POST" action="{{ url_for('import_lieux_google_csv') }}" enctype="multipart/form-data"
        style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
    <input type="file" name="csv" accept=".csv" required style="flex:1; min-width:220px;">
    <button type="submit" class="btn"><i class="fas fa-file-import"></i> Importer</button>
  </form>
</div>

<div class="actions-row">
  <a class="btn btn-ghost" href="{{ url_for('liste_lieux') }}"><i class="fas fa-arrow-left"></i> Retour aux lieux</a>
</div>
{% endblock %}
