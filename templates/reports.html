{% extends 'base_neon.html' %}
{% block title %}Reports{% endblock %}
{% block content %}

<h1 class="page-title">Reports</h1>
<p class="page-sub">Définir ou mettre à jour le report d'un musicien.</p>

{% if message %}
  <div class="alert alert-success">{{ message }}</div>
{% endif %}

<div class="card" style="max-width:560px">
  <div class="card-title"><span class="dot"></span> Saisir un report</div>

  <form method="post" autocomplete="off">
    <div class="form-grid">
      <div>
        <label for="musicien">Qui&nbsp;?</label>
        <select name="musicien" id="musicien" required onchange="updateValActuelle()">
          <option value="">-- Sélectionner --</option>
          {% for m in musiciens %}
            <option value="{{ m.id }}">{{ m.prenom ~ " " if m.prenom }}{{ m.nom }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="montant">Montant (€)</label>
        <input type="number" step="0.01" name="montant" id="montant" required placeholder="0.00">
      </div>
    </div>

    <p class="page-sub" id="val-actuelle" style="margin-top:10px"></p>

    <div class="row-actions" style="margin-top:16px;gap:12px">
      <button type="submit" class="btn"><i class="fas fa-check"></i> Valider</button>
      <a href="#" class="btn btn-ghost" onclick="if (document.referrer) { window.history.back(); } else { window.location.href='{{ url_for('accueil') }}'; } return false;"><i class="fas fa-arrow-left"></i> Retour</a>
    </div>
  </form>
</div>

{% endblock %}

{% block scripts %}
<script>
    // Pour afficher la valeur actuelle du report selon le musicien sélectionné
    const reports = {{ reports|tojson }};
    const selectMusicien = document.getElementById("musicien");
    const valActuelle = document.getElementById("val-actuelle");

    function updateValActuelle() {
        const key = selectMusicien.value;
        if (reports.hasOwnProperty(key)) {
            valActuelle.innerHTML = "Report actuel : <b>" + (reports[key] >= 0 ? "+" : "") + reports[key].toFixed(2) + " €</b>";
            document.getElementById("montant").value = reports[key];
        } else {
            valActuelle.innerHTML = "Aucun report existant pour ce musicien.";
            document.getElementById("montant").value = "";
        }
    }

    selectMusicien.addEventListener("change", updateValActuelle);
</script>
{% endblock %}
