{% extends 'base_neon.html' %}

{% block title %}Déclaration d’un cachet{% endblock %}

{% block content %}
<h1 class="page-title">Déclaration d’un cachet</h1>
<p class="page-sub">Saisis le musicien, les dates et le montant</p>

<div class="card">
  <div class="card-title"><span class="dot"></span> Nouveau cachet</div>

  <form method="POST" autocomplete="off">

    <!-- Ligne 1 : Musicien + Dates -->
    <div class="form-grid">
      <!-- MUSICIEN -->
      <div>
        <label for="musicien">Musicien</label>
        <select name="musicien" id="musicien" required>
          <option value="">-- Sélectionner --</option>
          {% for m in musiciens if m.nom != 'ASSO7' and m.nom != 'CB ASSO7' %}
            <option value="{{ m.id }}">{{ m.prenom }} {{ m.nom }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- DATES -->
      <div>
        <label for="dates_display">Dates</label>
        <input type="text" id="flatpickr_trigger" style="opacity:0; position:absolute; z-index:-1;">
        <textarea id="dates_display" readonly
                  style="height: 180px; resize: none; white-space: pre-wrap;"></textarea>
        <input type="hidden" name="dates_hidden" id="dates_hidden" required>
      </div>
    </div>

    <!-- Ligne 2 : Montant + Nombre de cachets -->
    <div class="form-grid">
      <!-- MONTANT -->
      <div>
        <label for="montant">Montant (€)</label>
        <input type="number" step="0.01" name="montant" id="montant" required>
      </div>

      <!-- NOMBRE DE CACHETS -->
      <div>
        <label for="nombre_cachets">Nombre de cachets</label>
        <input type="number" name="nombre_cachets" id="nombre_cachets" readonly>
      </div>

      <!-- MONTANT TOTAL -->
      <div>
        <label for="montant_total">Montant total (€)</label>
        <input type="text" id="montant_total" disabled>
      </div>
    </div>

    <!-- BOUTONS -->
    <div style="margin-top: 20px;">
      <button type="submit" class="btn"><i class="fas fa-check"></i> Valider</button>
    </div>

    <div class="row-actions" style="margin-top: 16px;">
      <a class="btn btn-ghost" href="{{ url_for('accueil') }}"><i class="fas fa-house"></i> Accueil</a>
      <a class="btn btn-ghost" href="#" onclick="if (document.referrer) { window.history.back(); } else { window.location.href='{{ url_for('accueil') }}'; }"><i class="fas fa-arrow-left"></i> Retour</a>
      <a class="btn btn-ghost" href="{{ url_for('archives_cachets') }}"><i class="fas fa-box-archive"></i> Archives</a>
      <a class="btn btn-ghost" href="{{ url_for('cachets_a_venir') }}"><i class="fas fa-calendar-plus"></i> À venir</a>
    </div>

  </form>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>
<script src="{{ url_for('static', filename='js/cachets_flatpickr.js') }}"></script>
{% endblock %}
