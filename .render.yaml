services:
  - type: web
    name: malo-comptes
    env: python
    region: frankfurt
    plan: free
    autoDeploy: true
    buildCommand: "pip install --upgrade pip && pip install -r requirements-prod.txt"
    # Plan free (~512 Mo RAM) : 1 worker multi-thread suffit pour 1 utilisateur et évite
    # les OOM dus aux libs lourdes (pandas, PyMuPDF, openpyxl) chargées par 2 workers.
    startCommand: "gunicorn -w 1 -k gthread --threads 8 -t 120 -b 0.0.0.0:$PORT App:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false  # géré côté Render (Postgres managé)

